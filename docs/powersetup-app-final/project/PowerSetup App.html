<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<title>PowerSetup · App-Design</title>
<meta name="viewport" content="width=1400" />
<link rel="stylesheet" href="tokens.css" />
<style>
  html, body { margin: 0; background: var(--sand-100); }
  .dc-artboard-inner { background: var(--bg-1); }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="primitives.jsx"></script>
<script type="text/babel" src="screens/landing.jsx"></script>
<script type="text/babel" src="screens/wizard.jsx"></script>
<script type="text/babel" src="screens/result.jsx"></script>
<script type="text/babel" src="screens/admin.jsx"></script>

<script type="text/babel" data-presets="react">
function App() {
  return (
    <DesignCanvas title="PowerSetup · End-to-End App-Design" subtitle="Startseite · 8-Schritt Konfigurator · Ergebnis · Admin — herstellerunabhängig, DACH-spezifisch, 2026">

      <DCSection id="marketing" title="1 · Startseite" subtitle="Landing-Page, die erklärt was PowerSetup ist, ohne Bullshit.">
        <DCArtboard id="landing" label="Landing · Scroll" width={1280} height={3100}>
          <LandingPage />
        </DCArtboard>
      </DCSection>

      <DCSection id="wizard" title="2 · Konfigurator-Wizard" subtitle="8 Schritte · Basis, Energie, Verbraucher, Reise, Autarkie, Kabel, Marken, Check. Rechte Spalte zeigt live die Kalkulation.">
        <DCArtboard id="w1" label="01 · Basis (System & Chemie)" width={1280} height={960}><WizardFrame step={1} /></DCArtboard>
        <DCArtboard id="w2" label="02 · Energie & Dachflächen" width={1280} height={960}><WizardFrame step={2} /></DCArtboard>
        <DCArtboard id="w3" label="03 · Verbraucher" width={1280} height={820}><WizardFrame step={3} /></DCArtboard>
        <DCArtboard id="w4" label="04 · Reise & Region" width={1280} height={960}><WizardFrame step={4} /></DCArtboard>
        <DCArtboard id="w5" label="05 · Autarkie" width={1280} height={820}><WizardFrame step={5} /></DCArtboard>
        <DCArtboard id="w6" label="06 · Kabelwege" width={1280} height={820}><WizardFrame step={6} /></DCArtboard>
        <DCArtboard id="w7" label="07 · Marken (optional)" width={1280} height={820}><WizardFrame step={7} /></DCArtboard>
        <DCArtboard id="w8" label="08 · Check · Übersicht + Solartaschen + Fokus-Slider" width={1280} height={1280}><WizardFrame step={8} /></DCArtboard>
      </DCSection>

      <DCSection id="result" title="3 · Ergebnis-Seite" subtitle="Der Reveal-Moment: ganzer Bauplan auf einer Seite, unten der Upsell für Schaltplan-PDF.">
        <DCArtboard id="res" label="Bauplan · Desktop" width={1280} height={2250}>
          <ResultPage />
        </DCArtboard>
      </DCSection>

      <DCSection id="admin" title="4 · Admin (Konservativ)" subtitle="Saubere SaaS-Shell · Left-Nav + Content. Genug Dichte für Power-User ohne zu Excel-Tabelle zu werden.">
        <DCArtboard id="a-dash" label="Dashboard" width={1440} height={900}><AdminDashboard /></DCArtboard>
        <DCArtboard id="a-prod" label="Produkte · Tabelle" width={1440} height={900}><AdminProducts /></DCArtboard>
        <DCArtboard id="a-brand" label="Marken · Karten" width={1440} height={900}><AdminBrands /></DCArtboard>
        <DCArtboard id="a-cons" label="Verbraucher-Katalog" width={1440} height={900}><AdminConsumers /></DCArtboard>
        <DCArtboard id="a-res" label="Setup-Detail" width={1440} height={900}><AdminResultDetail /></DCArtboard>
        <DCArtboard id="a-set" label="Einstellungen · Rechenmodell" width={1440} height={900}><AdminSettings /></DCArtboard>
      </DCSection>

    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
